name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Swift build, test, and quality gates
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install development tools
        run: brew bundle --file Brewfile

      - name: Run complete quality gate
        run: make check

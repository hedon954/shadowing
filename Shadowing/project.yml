name: Shadowing

options:
  bundleIdPrefix: com.hedon
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
    GCC_TREAT_WARNINGS_AS_ERRORS: true
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: 7.11.1

targets:
  Shadowing:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Features
        optional: true
      - path: Audio
        optional: true
      - path: Persistence
      - path: Services
        optional: true
      - path: Resources
        optional: true
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hedon.shadowing
        PRODUCT_NAME: Shadowing
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Shadowing.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - ShadowingTests

  ShadowingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Shadowing
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hedon.shadowing.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
